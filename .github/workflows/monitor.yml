name: flight-price-monitor

on:
  schedule:
    # Каждые 2 часа (UTC). Cron в Actions всегда в UTC.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}  # кнопка "Run workflow" для ручного запуска

# Нужно, чтобы коммитить обновлённую историю цен обратно в репозиторий.
permissions:
  contents: write

# Не запускать несколько прогонов параллельно (иначе конфликт при push).
concurrency:
  group: flight-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Проверить цены
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # При желании можно переопределить настройки прямо здесь:
          # ORIGIN: PEE
          # DESTINATION: MOW
          # MONTHS: "2026-07,2026-08"
          # MIN_STAY: "7"
          # MAX_STAY: "14"
          # DROP_THRESHOLD: "0.15"
        run: python monitor.py

      - name: Сохранить историю цен
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/alerts.json
          if git diff --cached --quiet; then
            echo "Изменений нет."
          else
            git commit -m "chore: обновление истории цен [skip ci]"
            git push
          fi
